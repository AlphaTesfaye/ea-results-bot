name: EA Careers Results Monitor

on:
  schedule:
    # Every 5 minutes. GitHub may delay this slightly under load - that's normal.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit updated seen_state.json

# Only one run at a time. If a run is already in progress when the next
# scheduled tick (or a manual trigger) fires, the new one waits in queue
# instead of running concurrently and racing the first one's git push.
concurrency:
  group: ea-results-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state (if changed)
        run: |
          if [ -n "$(git status --porcelain seen_state.json)" ]; then
            git config user.name "ea-results-bot"
            git config user.email "actions@github.com"
            git add seen_state.json
            git commit -m "Update seen announcements state [skip ci]"
            # Pull-rebase before pushing in case something else updated the
            # branch since checkout (belt-and-braces alongside concurrency: above)
            git pull --rebase origin main
            git push
          else
            echo "No state changes to commit."
          fi
